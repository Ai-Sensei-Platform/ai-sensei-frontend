# Rendered by the nginx:alpine entrypoint (envsubst) into
# /etc/nginx/conf.d/default.conf. ${PORT} comes from the environment so
# Cloud Run can override the listen port.
server {
    listen       ${PORT};
    listen       [::]:${PORT};
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    # nginx's bundled /etc/nginx/mime.types (included globally in the http block)
    # already maps .wasm -> application/wasm, alongside html/js/css. Do NOT add a
    # `types {}` block here: it *replaces* the whole MIME map instead of extending
    # it, which makes every file fall back to application/octet-stream and breaks
    # the SPA (browsers refuse to execute octet-stream JS modules).

    gzip            on;
    gzip_types      text/plain text/css application/javascript application/json application/wasm image/svg+xml;
    gzip_min_length 1024;

    # Hashed build assets are immutable and safe to cache aggressively.
    location /assets/ {
        expires    1y;
        add_header Cache-Control "public, immutable";
        try_files  $uri =404;
    }

    location /pdfjs-wasm/ {
        expires    1y;
        add_header Cache-Control "public, immutable";
        try_files  $uri =404;
    }

    # SPA fallback: every other route serves index.html so client routing works.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
